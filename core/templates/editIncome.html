{% extends 'base.html' %}

{% block title %}Edit Income | SpendWise{% endblock %}

{% block content %}
<div class="app-card auth-card">
    <h2 class="fw-bold mb-1">Edit Income</h2>
    <p class="text-secondary mb-4">Update this income entry.</p>

    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Amount</label>
            <input type="number" class="form-control" step="0.01" name="amount" value="{{ income.amount }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Source</label>
            <input type="text" class="form-control" name="source" value="{{ income.source }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Date</label>
            <input type="date" class="form-control" name="date" value="{{ income.date|date:'Y-m-d' }}" required>
        </div>
        <button type="submit" class="btn btn-income w-100">Update Income</button>
    </form>

    <a href="{% url 'dashboard' %}" class="btn btn-link text-decoration-none px-0 mt-3">Back to Dashboard</a>
</div>
{% endblock %}
