{% extends 'base.html' %}

{% block title %}Add Expense | SpendWise{% endblock %}

{% block content %}
<div class="app-card auth-card">
    <h2 class="fw-bold mb-1">Add Expense</h2>
    <p class="text-secondary mb-4">Track a new spending entry.</p>

    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Amount</label>
            <input type="number" class="form-control" name="amount" placeholder="0.00" step="0.01" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Category</label>
            <select class="form-select" name="category" required>
                <option value="Food">Food</option>
                <option value="Travel">Travel</option>
                <option value="Shopping">Shopping</option>
                <option value="Bills">Bills</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" name="description" placeholder="Optional note" rows="3"></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Date</label>
            <input type="date" class="form-control" name="date" required>
        </div>
        <button type="submit" class="btn btn-expense w-100">Add Expense</button>
    </form>

    <a href="{% url 'dashboard' %}" class="btn btn-link text-decoration-none px-0 mt-3">Back to Dashboard</a>
</div>
{% endblock %}
